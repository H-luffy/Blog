<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3 — 居中阅读型</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fefefe; color: #1a1a1a; font-family: 'Inter', sans-serif; }

  .wrap { max-width: 640px; margin: 0 auto; padding: 60px 24px; }

  header { text-align: center; margin-bottom: 56px; }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 36px; font-weight: 400; margin-bottom: 8px;
  }
  header p { font-size: 12px; color: #bbb; letter-spacing: 3px; text-transform: uppercase; }

  .search-center {
    text-align: center; margin-bottom: 48px;
  }
  .search-center input {
    width: 100%; max-width: 400px; padding: 12px 16px;
    border: none; border-bottom: 1px solid #ddd; background: transparent;
    font-family: 'Inter', sans-serif; font-size: 14px; outline: none; text-align: center;
  }
  .search-center input:focus { border-bottom-color: #1a1a1a; }
  .search-center input::placeholder { color: #ccc; }

  .post { text-align: center; padding: 36px 0; border-bottom: 1px solid #f0f0f0; }
  .post:last-child { border-bottom: none; }

  .post .date { font-size: 11px; color: #ccc; letter-spacing: 2px; margin-bottom: 12px; }
  .post h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 24px; font-weight: 400; margin-bottom: 10px;
    cursor: pointer; transition: color 0.2s;
  }
  .post h2:hover { color: #6366f1; }
  .post p { font-size: 14px; color: #888; line-height: 1.7; max-width: 480px; margin: 0 auto; }
  .post .tags { margin-top: 14px; display: flex; gap: 8px; justify-content: center; }
  .post .tag {
    font-size: 9px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 4px 10px; background: #f5f5f5; color: #999;
  }

  .pag { display: flex; justify-content: center; gap: 12px; padding: 48px 0 0; }
  .pag span { font-size: 18px; color: #ddd; cursor: pointer; }
  .pag span.active { color: #1a1a1a; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>我的博客</h1>
    <p>A digital garden</p>
  </header>

  <div class="search-center">
    <input type="text" placeholder="搜索文章">
  </div>

  <div class="post">
    <div class="date">2026.06.20</div>
    <h2>Vue3 入门教程</h2>
    <p>本文介绍 Vue3 的基础用法，从响应式系统到组合式 API。</p>
    <div class="tags"><span class="tag">Vue.js</span><span class="tag">前端</span></div>
  </div>

  <div class="post">
    <div class="date">2026.06.19</div>
    <h2>Spring Boot 实战</h2>
    <p>Spring Boot 快速搭建后端服务，自动配置、内嵌 Tomcat。</p>
    <div class="tags"><span class="tag">Spring Boot</span><span class="tag">后端</span></div>
  </div>

  <div class="post">
    <div class="date">2026.06.18</div>
    <h2>全栈开发之路</h2>
    <p>从前端到后端的全栈学习指南，涵盖 Vue3、Spring Boot、MySQL。</p>
    <div class="tags"><span class="tag">全栈</span><span class="tag">前端</span><span class="tag">后端</span></div>
  </div>

  <div class="pag">
    <span>‹</span><span class="active">·</span><span>›</span>
  </div>
</div>
</body>
</html>
